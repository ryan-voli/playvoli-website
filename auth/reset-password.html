<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to VOLI App...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      font-family: Arial, sans-serif;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
    }
    .logo {
      width: 120px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #ff3366;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #ff3366;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
    .fallback {
      margin-top: 30px;
      padding: 20px;
      background-color: #1e1e1e;
      border-radius: 12px;
      display: none;
    }
    .fallback.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://playvoli.com/images/official_logo_dark_text.webp" alt="VOLI Logo" class="logo">
    <h1>Redirecting to VOLI App...</h1>
    <div class="spinner"></div>
    <p>Opening the VOLI app to reset your password.</p>
    <p style="margin-top: 20px; font-size: 14px; color: #888;">If you're not redirected automatically, <a href="#" id="manualLink">click here</a>.</p>

    <div class="fallback" id="fallback">
      <p style="color: #ff3366; font-weight: bold;">Don't have the VOLI app installed?</p>
      <p style="font-size: 14px; margin-top: 10px;">Download it from:</p>
      <p style="margin-top: 15px;">
        <a href="https://apps.apple.com/app/voli" style="margin-right: 15px;">App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.playvoli.app">Google Play</a>
      </p>
      <p style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #333333;">
        <a href="#" id="openAppBtn" style="display:inline-block; padding: 12px 24px; background-color:#1e1e1e; color:#ff3366; text-decoration:none; border-radius:8px; border: 2px solid #ff3366; font-weight:bold;">
          Open VOLI App
        </a>
      </p>
    </div>
  </div>

  <script>
    // Get the full URL with hash fragment (contains Supabase tokens)
    const fullUrl = window.location.href;
    const hash = window.location.hash;

    // Create the deep link with the tokens
    const appDeepLink = 'voli://auth/reset-password' + hash;

    console.log('Full URL:', fullUrl);
    console.log('Hash fragment:', hash);
    console.log('Deep link:', appDeepLink);

    // Set the manual link and fallback button
    document.getElementById('manualLink').href = appDeepLink;
    document.getElementById('openAppBtn').href = appDeepLink;

    // Automatically redirect after a short delay
    setTimeout(() => {
      window.location.href = appDeepLink;

      // Show fallback after 3 seconds (in case app isn't installed)
      setTimeout(() => {
        document.getElementById('fallback').classList.add('show');
      }, 3000);
    }, 500);
  </script>
</body>
</html>
