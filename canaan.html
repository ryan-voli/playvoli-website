    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #c8ff00;
            --accent-glow: rgba(200, 255, 0, 0.3);
            --accent-subtle: rgba(200, 255, 0, 0.1);
        }

        html {
            background: var(--bg-dark);
            background-image:
                linear-gradient(to bottom, var(--bg-dark), transparent 60px, transparent calc(100% - 60px), var(--bg-dark)),
                radial-gradient(circle at 30% 20%, rgba(200, 255, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            min-height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: calc(2rem + env(safe-area-inset-top));
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
            padding-left: calc(2rem + env(safe-area-inset-left));
            padding-right: calc(2rem + env(safe-area-inset-right));
            overflow-x: hidden;
        }

        /* Main card container */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        /* Logo */
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: block;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Typography */
        .title {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .title span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 400;
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Primary CTA Button */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--accent);
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary svg {
            width: 20px;
            height: 20px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Store buttons */
        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-store {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-store:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-store svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .btn-store-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .btn-store-label {
            font-size: 0.7rem;
            font-weight: 400;
            color: white;
            opacity: 0.8;
        }

        .btn-store-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            line-height: 1;
            margin-top: 1px;
        }

        /* Footer */
        .footer {
            margin-top: 2rem;
            text-align: center;
        }

        .footer a {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        /* Popup styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .popup {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        .popup h2 {
            color: var(--accent);
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .popup p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .popup button {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .popup button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

                </svg>

                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 010 1.73l-2.808 1.626L15.206 12l2.492-2.491zM5.864 2.658L16.802 8.99l-2.303 2.303-8.635-8.635z"/>
                </svg>
                <div class="btn-store-text">

            </a>

    </main>

    <footer class="footer">
        <a href="contact.html">Contact</a> &nbsp;&middot;&nbsp; <a href="privacy.html">Privacy</a> &nbsp;&middot;&nbsp; <a href="terms.html">Terms</a>
        <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.75rem;">© 2026 VOLI LLC. All rights reserved.</p>
    </footer>

    <script>
        // Smart deep link handler with popup fallback
        function handleDeepLink(event, deepLink) {
            event.preventDefault();
            window.location.href = deepLink;

            setTimeout(function() {
                if (!document.hidden) {
                    showAppDownloadPopup();
                }
            }, 2000);
        }

        function showAppDownloadPopup() {
            const overlay = document.createElement('div');
            overlay.className = 'popup-overlay';

            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.innerHTML = `
                <h2>Download VOLI to Join!</h2>
                <p>Get the VOLI app to join Canaan's fantasy volleyball league.</p>
                <button id="close-popup">Got it</button>
            `;

            overlay.appendChild(popup);
            document.body.appendChild(overlay);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target.id === 'close-popup') {
                    document.body.removeChild(overlay);
                }
            });

            setTimeout(function() {
                const storeButtons = document.querySelector('.store-buttons');
                if (storeButtons) {
                    storeButtons.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }
    </script>
