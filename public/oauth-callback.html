<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing In - VOLI</title>
<style>
  body { margin:0; background:#0a0a0b; color:#fff; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { text-align:center; padding:3rem 2rem; }
  .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top:3px solid #00d4ff; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 1.5rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .title { font-size:1.5rem; font-weight:700; margin-bottom:.5rem; }
  .subtitle { color:rgba(255,255,255,0.6); font-size:1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1 class="title">Signing you in...</h1>
  <p class="subtitle" id="msg">Please wait while we complete your sign in.</p>
</div>
<script>
setTimeout(function(){
  try {
    var u = new URL(window.location.href);
    var p = new URLSearchParams();
    if (u.search) new URLSearchParams(u.search).forEach(function(v,k){ p.append(k,v); });
    if (u.hash) new URLSearchParams(u.hash.substring(1)).forEach(function(v,k){ p.append(k,v); });
    var dl = 'voli://oauth/callback?' + p.toString();
    document.getElementById('msg').textContent = 'Opening VOLI app...';
    window.location.href = dl;
  } catch(e) {
    document.getElementById('msg').textContent = 'Something went wrong. Please try again.';
  }
}, 500);
</script>
</body>
</html>
