    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #c8ff00;
            --accent-glow: rgba(200, 255, 0, 0.3);
        }

        html {
            background: var(--bg-dark);
            background-image:
                linear-gradient(to bottom, var(--bg-dark), transparent 60px, transparent calc(100% - 60px), var(--bg-dark)),
                radial-gradient(circle at 30% 20%, rgba(200, 255, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            min-height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5rem 2rem 2rem;
            padding-top: calc(5rem + env(safe-area-inset-top));
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
            padding-left: calc(2rem + env(safe-area-inset-left));
            padding-right: calc(2rem + env(safe-area-inset-right));
            overflow-x: hidden;
        }

        /* Main card container */
        .card {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        /* Typography */
        .title {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Content styles */
        .content {
            text-align: left;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .content h2, .content h3 {
            color: var(--text-primary);
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .content h2 {
            font-size: 1.25rem;
        }

        .content h3 {
            font-size: 1.1rem;
        }

        .content p {
            margin-bottom: 1rem;
        }

        .content ul, .content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content a {
            color: var(--accent);
            text-decoration: none;
        }

        .content a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            margin-top: 2rem;
            text-align: center;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 1rem;
        }

        .social-icons a {
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .social-icons a:hover {
            color: var(--text-primary);
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
        }

        .footer-links a {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-secondary);
        }

        /* Navigation */
        .nav-container {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-logo img {
            height: 28px;
            width: auto;
        }

        .nav-logo span {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .nav {
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
        }

        .download-pill {
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #00d4ff;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        .download-pill:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        /* QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .qr-modal.active {
            display: flex;
        }

        .qr-modal-content {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            max-width: 320px;
        }

        .qr-modal h3 {
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
        }

        .qr-modal p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .qr-modal img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            background: white;
            padding: 10px;
        }

        .qr-modal-close {
            margin-top: 1.5rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qr-modal-close:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: var(--text-primary);
        }

        .nav a.active {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 6rem 1rem 1rem;
            }

            .nav-container {
                gap: 0.5rem;
            }

            .nav {
                padding: 0.6rem 1.25rem;
                gap: 1.25rem;
            }

            .nav a {
                font-size: 0.8rem;
            }

            .download-pill {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }

            .card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .title {
                font-size: 1.5rem;
            }
        }
    </style>

    <script>
        // Platform detection and download handler
        function handleDownload() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            var isAndroid = /android/i.test(userAgent);

            if (isIOS) {
                window.location.href = 'https://apps.apple.com/us/app/voli-the-volleyball-hub/id6749812982';
            } else if (isAndroid) {
                window.location.href = 'https://play.google.com/store/apps/details?id=com.playvoli.app';
            } else {
                document.getElementById('qr-modal').classList.add('active');
            }
        }

        function closeQrModal() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        document.getElementById('qr-modal').addEventListener('click', function(e) {
            if (e.target === this) closeQrModal();
        });
    </script>
