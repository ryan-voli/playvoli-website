    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0a0b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #c8ff00;
            --accent-glow: rgba(200, 255, 0, 0.3);
            --electric-blue: #00d4ff;
        }

        html {
            background: var(--bg-dark);
            background-image:
                linear-gradient(to bottom, var(--bg-dark), transparent 60px, transparent calc(100% - 60px), var(--bg-dark)),
                radial-gradient(circle at 30% 20%, rgba(200, 255, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            min-height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5rem 2rem 2rem;
            padding-top: calc(5rem + env(safe-area-inset-top));
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }

        /* Navigation */
        .nav-container {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-logo img { height: 28px; width: auto; }
        .nav-logo span { color: #fff; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; }

        .nav {
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover { color: var(--text-primary); }

        .download-pill {
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--electric-blue);
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        .download-pill:hover { background: rgba(0, 212, 255, 0.1); }

        /* Auth Slot (right side of nav) */
        .nav-auth {
            display: flex;
            align-items: center;
        }

        .nav-login-link {
            padding: 0.6rem 1.1rem;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .nav-login-link:hover { opacity: 0.8; }

        .avatar-wrapper {
            position: relative;
        }

        .nav-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            cursor: pointer;
            object-fit: cover;
            transition: opacity 0.2s;
        }

        .nav-avatar:hover { opacity: 0.85; }

        .nav-avatar-fallback {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .nav-avatar-fallback:hover { opacity: 0.85; }

        .nav-avatar-fallback svg {
            width: 20px;
            height: 20px;
            color: var(--accent);
        }

        /* Avatar Dropdown */
        .avatar-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 22, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 140px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .avatar-dropdown.open { display: block; }

        .dropdown-item {
            display: block;
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: none;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }

        /* Content */
        .content {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .btn-signin {
            display: inline-block;
            padding: 0.875rem 2.5rem;
            background: var(--accent);
            color: #000;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px var(--accent-glow);
            text-decoration: none;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .hidden { display: none !important; }

        /* Loading */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 4rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            padding: 3rem 2rem;
            padding-bottom: calc(3rem + env(safe-area-inset-bottom));
            text-align: center;
            border-top: 1px solid var(--glass-border);
            width: 100%;
            margin-top: 2rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .social-icons a { color: var(--text-muted); transition: color 0.2s; }
        .social-icons a:hover { color: var(--text-primary); }
        .social-icons svg { width: 22px; height: 22px; }

        .footer-links { margin-bottom: 1.5rem; }
        .footer-links a {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--text-secondary); }

        .footer-copyright { color: var(--text-muted); font-size: 0.75rem; }

        /* QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .qr-modal.active { display: flex; }

        .qr-modal-content {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            max-width: 320px;
        }

        .qr-modal h3 { margin-bottom: 0.5rem; font-size: 1.25rem; }
        .qr-modal p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .qr-modal img { width: 200px; height: 200px; border-radius: 12px; background: white; padding: 10px; }

        .qr-modal-close {
            margin-top: 1.5rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qr-modal-close:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 6rem 1rem 1rem; }
            .nav-container { gap: 0.5rem; }
            .nav { padding: 0.6rem 1.25rem; gap: 1.25rem; }
            .nav a { font-size: 0.8rem; }
            .download-pill { padding: 0.6rem 1rem; font-size: 0.8rem; }
            .nav-login-link { font-size: 0.8rem; padding: 0.5rem 0.75rem; }
        }
    </style>
</head>

    <script>
        // ── Supabase Init ──
        const SUPABASE_URL = 'https://api.playvoli.com';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjaG9sa3JqcHV6YWhxdW1hamVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0MDcwMzQsImV4cCI6MjA1OTk4MzAzNH0.RVhKzZkLxwwtbow3i3tUSVVnG_hMl-q0bwuvmqNuDq0';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $loading = document.getElementById('loading-state');
        const $signinPrompt = document.getElementById('signin-prompt');
        const $gameContainer = document.getElementById('game-container');
        const $navAuth = document.getElementById('nav-auth');

        // ── Auth State ──
        async function init() {
            const { data: { session } } = await sb.auth.getSession();

            if (session) {
                showGame(session.user);
            } else {
                showSigninPrompt();
            }

            sb.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    showGame(session.user);
                } else if (event === 'SIGNED_OUT') {
                    showSigninPrompt();
                }
            });
        }

        function renderNavAuth(user) {
            if (!user) {
                $navAuth.innerHTML = '<a href="/auth?redirect=/dailygrid" class="nav-login-link">Log In</a>';
                return;
            }

            const avatarUrl = user.user_metadata?.avatar_url;

            let avatarHtml;
            if (avatarUrl) {
                avatarHtml = '<img class="nav-avatar" src="' + escapeAttr(avatarUrl) + '" alt="Avatar" onclick="toggleAvatarDropdown(event)">';
            } else {
                avatarHtml = '<div class="nav-avatar-fallback" onclick="toggleAvatarDropdown(event)">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>' +
                    '<circle cx="12" cy="7" r="4"/>' +
                    '</svg></div>';
            }

            $navAuth.innerHTML =
                '<div class="avatar-wrapper">' +
                    avatarHtml +
                    '<div class="avatar-dropdown" id="avatar-dropdown">' +
                        '<button class="dropdown-item" onclick="handleLogout()">Log Out</button>' +
                    '</div>' +
                '</div>';
        }

        function toggleAvatarDropdown(e) {
            e.stopPropagation();
            const dd = document.getElementById('avatar-dropdown');
            dd.classList.toggle('open');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            const dd = document.getElementById('avatar-dropdown');
            if (dd) dd.classList.remove('open');
        });

        function showSigninPrompt() {
            $loading.classList.add('hidden');
            $gameContainer.classList.add('hidden');
            $signinPrompt.classList.remove('hidden');
            renderNavAuth(null);
        }

        function showGame(user) {
            $loading.classList.add('hidden');
            $signinPrompt.classList.add('hidden');
            $gameContainer.classList.remove('hidden');
            renderNavAuth(user);
        }

        // ── Logout ──
        async function handleLogout() {
            await sb.auth.signOut();
        }

        // ── Utility ──
        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Download handler ──
        function handleDownload() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                window.location.href = 'https://apps.apple.com/us/app/voli-the-volleyball-hub/id6749812982';
            } else if (/android/i.test(ua)) {
                window.location.href = 'https://play.google.com/store/apps/details?id=com.playvoli.app';
            } else {
                document.getElementById('qr-modal').classList.add('active');
            }
        }

        function closeQrModal() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        document.getElementById('qr-modal').addEventListener('click', function(e) {
            if (e.target === this) closeQrModal();
        });

        // ── Init ──
        init();
    </script>
</body>
</html>
