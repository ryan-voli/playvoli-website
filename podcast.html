    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://api.playvoli.com';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjaG9sa3JqcHV6YWhxdW1hamVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0MDcwMzQsImV4cCI6MjA1OTk4MzAzNH0.RVhKzZkLxwwtbow3i3tUSVVnG_hMl-q0bwuvmqNuDq0';

        // Extract podcast ID from URL
        const pathParts = window.location.pathname.split('/');
        const podcastId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

        console.log('Podcast ID from URL:', podcastId);

        // Fetch podcast data
        async function loadPodcast() {
            if (!podcastId || podcastId === 'podcast.html' || podcastId === 'podcast' || podcastId === '') {
                console.log('No podcast ID, showing default state');
                return;
            }

            try {
                const url = `${SUPABASE_URL}/rest/v1/podcasts?podcast_id=eq.${podcastId}&select=*`;
                console.log('Fetching from:', url);

                const response = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Accept-Profile': 'content',
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API Error:', errorText);
                    throw new Error('Failed to fetch podcast');
                }

                const data = await response.json();
                console.log('Received data:', data);

                if (!data || data.length === 0) {
                    console.error('No podcast found with this ID');
                    return;
                }

                const podcast = data[0];
                displayPodcast(podcast);
            } catch (error) {
                console.error('Error loading podcast:', error);
            }
        }

        // Display podcast data
        function displayPodcast(podcast) {
            console.log('Displaying podcast:', podcast);

            // Update title
            document.getElementById('podcast-title').textContent = podcast.title || 'Untitled Podcast';

            // Update description
            document.getElementById('podcast-description').textContent = podcast.description || 'Listen to this podcast and discover volleyball content, stats, fantasy leagues, and more!';

            // Update image
            if (podcast.image_url) {
                document.getElementById('podcast-image').src = podcast.image_url;
                document.getElementById('podcast-image').alt = podcast.title || 'Podcast Cover';
            }

            // Update page metadata
            document.getElementById('page-title').textContent = `${podcast.title || 'Podcast'} - VOLI`;
            document.getElementById('page-description').content = podcast.description || 'Listen to this podcast on VOLI';
            document.getElementById('og-title').content = podcast.title || 'VOLI Podcast';
            document.getElementById('og-description').content = podcast.description || 'Listen to this podcast on VOLI';
            document.getElementById('twitter-title').content = podcast.title || 'VOLI Podcast';
            document.getElementById('twitter-description').content = podcast.description || 'Listen to this podcast on VOLI';

            if (podcast.image_url) {
                document.getElementById('og-image').content = podcast.image_url;
                document.getElementById('twitter-image').content = podcast.image_url;
            }

            // Update open app button
            const appSchemeUrl = `voli://podcast/${podcastId}`;
            const openAppBtn = document.getElementById('open-app-btn');
            openAppBtn.href = appSchemeUrl;

            openAppBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = appSchemeUrl;
            });

            console.log('Podcast displayed successfully');
        }

        // Load podcast on page load
        window.addEventListener('load', loadPodcast);
    </script>
