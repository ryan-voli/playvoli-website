<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Load</title>
</head>
<body>
    <h1>Testing API</h1>
    <div id="status"></div>
    <div id="output"></div>

    <script>
        const SUPABASE_URL = 'https://api.playvoli.com';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjaG9sa3JqcHV6YWhxdW1hamVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0MDcwMzQsImV4cCI6MjA1OTk4MzAzNH0.RVhKzZkLxwwtbow3i3tUSVVnG_hMl-q0bwuvmqNuDq0';

        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const outputDiv = document.getElementById('output');

            statusDiv.innerHTML = 'Testing...';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/global_settings?select=terms_of_use&limit=1`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                statusDiv.innerHTML = `Status: ${response.status}`;

                if (response.ok) {
                    const data = await response.json();
                    console.log('Data received:', data);

                    if (data && data.length > 0 && data[0].terms_of_use) {
                        outputDiv.innerHTML = `
                            <p>✅ SUCCESS!</p>
                            <p>Title: ${data[0].terms_of_use.title}</p>
                            <p>Effective Date: ${data[0].terms_of_use.effective_date}</p>
                            <p>Sections: ${data[0].terms_of_use.sections.length}</p>
                        `;
                    } else {
                        outputDiv.innerHTML = '❌ No data in response';
                    }
                } else {
                    const errorText = await response.text();
                    outputDiv.innerHTML = `❌ Error: ${errorText}`;
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Exception';
                outputDiv.innerHTML = `Error: ${error.message}`;
                console.error('Error:', error);
            }
        }

        testAPI();
    </script>
</body>
</html>
