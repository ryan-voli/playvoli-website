<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLI - The Volleyball Hub</title>
    <meta name="description" content="Fantasy volleyball, live stats, and community together in one revolutionary app.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://playvoli.com/">
    <meta property="og:title" content="VOLI - The Volleyball Hub">
    <meta property="og:description" content="Fantasy volleyball, live stats, and community together in one revolutionary app.">
    <meta property="og:image" content="https://playvoli.com/images/official_logo_dark_bg.webp">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://playvoli.com/">
    <meta property="twitter:title" content="VOLI - The Volleyball Hub">
    <meta property="twitter:description" content="Fantasy volleyball, live stats, and community together in one revolutionary app.">
    <meta property="twitter:image" content="https://playvoli.com/images/official_logo_dark_bg.webp">

    <link rel="stylesheet" href="css/new-styles.css">
    <link rel="icon" href="images/official_logo_dark_bg.webp">

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W77KSNYJG3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W77KSNYJG3');
    </script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

    <!-- GSAP and ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body>
    <!-- Scroll Spacer (invisible, creates scroll height) -->
    <div id="scroll-spacer"></div>

    <!-- Sections Container (fixed viewport) -->
    <div id="sections-container">
        <!-- Hero Section -->
        <section id="hero" class="section">
            <div class="hero-background"></div>
            <img src="images/official_logo_dark_text.webp" alt="VOLI Logo" class="hero-logo">
            <h1 class="hero-tagline">The Volleyball Hub</h1>
            <div class="scroll-indicator">
                <svg width="30" height="50" viewBox="0 0 30 50">
                    <rect x="5" y="5" width="20" height="35" rx="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="15" cy="15" r="3" fill="currentColor" class="scroll-dot"/>
                </svg>
                <p>Scroll</p>
            </div>
        </section>

        <!-- Fantasy Carousel Section (Horizontal Scroll) -->
        <section id="fantasy-carousel" class="section horizontal-section">
            <h2 class="section-title fantasy-title">FANTASY</h2>
            <h2 class="section-title stats-title" style="opacity: 0;">STATS</h2>
            <h2 class="section-title games-title" style="opacity: 0;">GAMES</h2>
            <p class="fantasy-explainer fantasy-text">Fantasy built from the ground up for volleyball</p>
            <p class="fantasy-explainer stats-text" style="opacity: 0;">More in-depth real-time stats than anywhere else</p>
            <p class="fantasy-explainer games-text" style="opacity: 0;">Play-by-plays and information for every game</p>
            <div class="carousel-wrapper">
                <div class="carousel-track">
                    <div class="carousel-item">
                        <img src="images/screenshots/fantasy1.webp" alt="Fantasy Roster" class="fantasy-screenshot">
                        <img src="images/screenshots/stats1.webp" alt="Stats Overview" class="stats-screenshot" style="opacity: 0;">
                        <img src="images/screenshots/games1.webp" alt="Game Details" class="games-screenshot" style="opacity: 0;">
                    </div>
                    <div class="carousel-item">
                        <img src="images/screenshots/fantasy2.webp" alt="Fantasy Players" class="fantasy-screenshot">
                        <img src="images/screenshots/stats2.webp" alt="Stats Details" class="stats-screenshot" style="opacity: 0;">
                        <img src="images/screenshots/games2.webp" alt="Play by Play" class="games-screenshot" style="opacity: 0;">
                    </div>
                    <div class="carousel-item">
                        <img src="images/screenshots/fantasy3.webp" alt="Fantasy Teams" class="fantasy-screenshot">
                        <img src="images/screenshots/stats3.webp" alt="Stats Leaders" class="stats-screenshot" style="opacity: 0;">
                        <img src="images/screenshots/games3.webp" alt="Game Schedule" class="games-screenshot" style="opacity: 0;">
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Fixed Download Buttons -->
    <div class="fixed-download-buttons">
        <a href="https://apps.apple.com/us/app/voli-the-volleyball-hub/id6749812982"
           onclick="gtag('event', 'click', {'event_category': 'download', 'event_label': 'app_store', 'source': 'homepage'});"
           class="app-store-button">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            <div class="btn-text">
                <div class="btn-subtitle">Download on the</div>
                <div class="btn-title">App Store</div>
            </div>
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.playvoli.app"
           onclick="gtag('event', 'click', {'event_category': 'download', 'event_label': 'play_store', 'source': 'homepage'});"
           class="play-store-button">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 010 1.73l-2.808 1.626L15.206 12l2.492-2.491zM5.864 2.658L16.802 8.99l-2.303 2.303-8.635-8.635z"/>
            </svg>
            <div class="btn-text">
                <div class="btn-subtitle">GET IT ON</div>
                <div class="btn-title">Google Play</div>
            </div>
        </a>
    </div>

    <script src="js/new-main.js"></script>
</body>
</html>
