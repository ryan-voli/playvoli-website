<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMES Test</title>
    <style>
        body {
            margin: 0;
            background: #131819;
            color: white;
            font-family: Arial, sans-serif;
        }
        .test-section {
            padding: 40px;
            border-bottom: 2px solid #00d4ff;
        }
        .test-section h2 {
            color: #C8FF00;
            margin-bottom: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            background: #1f2629;
            border-radius: 4px;
        }
        .pass {
            color: #00ff00;
        }
        .fail {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="test-section">
        <h2>GAMES Element Tests</h2>
        <div id="tests"></div>
    </div>

    <script>
        const tests = [];

        // Test 1: games-title exists
        const gamesTitle = document.querySelector('.games-title');
        tests.push({
            name: 'games-title element exists in parent page',
            pass: false,
            message: 'Need to check parent page'
        });

        // Test 2: games-text exists
        tests.push({
            name: 'games-text element exists in parent page',
            pass: false,
            message: 'Need to check parent page'
        });

        // Test 3: games screenshots exist
        tests.push({
            name: 'games-screenshot elements exist in parent page',
            pass: false,
            message: 'Need to check parent page'
        });

        // Load actual page in iframe and test
        const iframe = document.createElement('iframe');
        iframe.src = 'index.html';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        iframe.onload = () => {
            const iframeDoc = iframe.contentDocument;

            // Test 1
            const gamesTitle = iframeDoc.querySelector('.games-title');
            tests[0].pass = !!gamesTitle;
            tests[0].message = gamesTitle ? `Found: "${gamesTitle.textContent}"` : 'Element not found';

            // Test 2
            const gamesText = iframeDoc.querySelector('.games-text');
            tests[1].pass = !!gamesText;
            tests[1].message = gamesText ? `Found: "${gamesText.textContent}"` : 'Element not found';

            // Test 3
            const gamesScreenshots = iframeDoc.querySelectorAll('.games-screenshot');
            tests[2].pass = gamesScreenshots.length === 3;
            tests[2].message = `Found ${gamesScreenshots.length} elements (expected 3)`;

            // Additional tests
            tests.push({
                name: 'games-screenshot images have valid src',
                pass: Array.from(gamesScreenshots).every(img => img.src.includes('games')),
                message: Array.from(gamesScreenshots).map(img => img.src.split('/').pop()).join(', ')
            });

            tests.push({
                name: 'games-title has correct CSS positioning',
                pass: gamesTitle && window.getComputedStyle(gamesTitle).position === 'absolute',
                message: gamesTitle ? `position: ${window.getComputedStyle(gamesTitle).position}` : 'N/A'
            });

            tests.push({
                name: 'games-title has initial opacity: 0',
                pass: gamesTitle && gamesTitle.style.opacity === '0',
                message: gamesTitle ? `opacity: ${gamesTitle.style.opacity}` : 'N/A'
            });

            // Display results
            const testsDiv = document.getElementById('tests');
            tests.forEach(test => {
                const div = document.createElement('div');
                div.className = 'test-result';
                div.innerHTML = `
                    <strong class="${test.pass ? 'pass' : 'fail'}">${test.pass ? '✓' : '✗'}</strong>
                    ${test.name}<br>
                    <small>${test.message}</small>
                `;
                testsDiv.appendChild(div);
            });
        };
    </script>
</body>
</html>
